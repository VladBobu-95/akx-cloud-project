# Este archivo SOLO se usa en tu PC de casa (Docker Compose lo carga
# automaticamente si existe). NO lo subas al servidor: esta en .gitignore... no,
# en realidad SI se sube al repo, pero en el servidor se ignora arrancando con:
#   docker compose -f docker-compose.yml up -d --build
#
# En casa basta con:  docker compose up -d
# y levanta ademas un Ollama local para no depender del servidor.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: clouddrive-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    # GPU de 8 GB: no caben dos modelos grandes a la vez (deepseek-ocr ~6.7 GB +
    # qwen 4.9 GB, o + bge-m3). Con el keep_alive de 10 min de las llamadas, un
    # modelo se quedaba fijado en VRAM y la siguiente pasada del MISMO escaneo
    # (OCR->embeddings->extraccion, que salta de modelo) esperaba hasta 10 min a
    # que expirara -> el archivo se quedaba "procesando" para siempre.
    # Con un solo modelo cargado a la vez, Ollama EXPULSA el anterior y carga el
    # que toca (swap limpio) en vez de esperar. Cuesta una recarga por cambio de
    # modelo, pero elimina el cuelgue. (En el servidor, con GPU grande y Ollama
    # externo, este override no aplica.)
    environment:
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - clouddrive_ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Visor web de la base de datos (solo local). Abrir en http://localhost:8080
  # System: PostgreSQL · Server: db · usuario/contraseña/BD: los de tu .env
  adminer:
    image: adminer:latest
    container_name: clouddrive-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${ADMINER_PORT_HOST:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

  api:
    environment:
      NODE_ENV: development
      OLLAMA_URL: http://ollama:11434

volumes:
  clouddrive_ollama_data:
