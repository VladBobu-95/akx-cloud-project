<header class="navbar">
  <div class="nav-inner">
    <a class="logo" [routerLink]="auth.esSuperadmin() ? '/plataforma' : (auth.puedeChat() ? '/inicio' : '/archivos')">
      <img class="logo-img" src="ateka-logo.png" alt="" /> ATEKA <span class="logo-light">Cloud</span>
    </a>

    <nav class="nav-links">
      @if (auth.esSuperadmin()) {
        <a routerLink="/plataforma" routerLinkActive="active">Plataforma</a>
      } @else {
        @if (auth.puedeChat()) {
          <a routerLink="/inicio" routerLinkActive="active">Inicio</a>
        }
        <a routerLink="/archivos" routerLinkActive="active">Mis archivos</a>
        <a routerLink="/facturas" routerLinkActive="active">Facturas</a>
        <a routerLink="/papelera" routerLinkActive="active">Papelera</a>
        @if (auth.esAdmin()) {
          <a routerLink="/equipo" routerLinkActive="active">Equipo</a>
        }
      }
    </nav>

    <span class="spacer"></span>

    <a class="perfil" routerLink="/perfil" title="Mi perfil">
      <span class="avatar">
        @if (auth.usuario()?.avatar) {
          <img [src]="auth.usuario()?.avatar" alt="avatar" />
        } @else {
          {{ inicial() }}
        }
      </span>
      <span class="user-nombre">{{ auth.usuario()?.nombre || auth.usuario()?.email }}</span>
    </a>
    <button class="btn btn-outline btn-sm btn-logout" (click)="auth.logout()">Cerrar sesión</button>
  </div>
</header>

<main class="container page">
  <router-outlet />
</main>
