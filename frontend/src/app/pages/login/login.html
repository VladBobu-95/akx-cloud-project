    <div class="auth-wrap">
      <div class="card auth-card">
        <div class="brand">
          <span class="logo-mark">▲</span> AKX <span class="green">Cloud</span>
        </div>

        <div class="tabs">
          <button
            [class.active]="modo() === 'login'"
            (click)="modo.set('login'); error.set(null)"
            type="button"
          >
            Iniciar sesión
          </button>
          <button
            [class.active]="modo() === 'registro'"
            (click)="modo.set('registro'); error.set(null)"
            type="button"
          >
            Crear cuenta
          </button>
        </div>

        <form (ngSubmit)="enviar()">
          @if (modo() === 'registro') {
            <div class="field">
              <label for="nombre">Nombre de usuario</label>
              <input
                id="nombre"
                class="input"
                type="text"
                name="nombre"
                [(ngModel)]="nombre"
                placeholder="Tu nombre"
                required
                autocomplete="username"
              />
            </div>
          }
          <div class="field">
            <label for="email">Email</label>
            <input
              id="email"
              class="input"
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="tucorreo@ejemplo.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="field">
            <label for="password">Contraseña</label>
            <div class="input-pass">
              <input
                id="password"
                class="input"
                [type]="verPassword() ? 'text' : 'password'"
                name="password"
                [(ngModel)]="password"
                placeholder="Mínimo 8 caracteres"
                required
                autocomplete="current-password"
              />
              <button type="button" class="ojo" (click)="verPassword.set(!verPassword())" tabindex="-1">
                @if (verPassword()) {
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                } @else {
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                }
              </button>
            </div>
          </div>

          @if (error()) {
            <p class="error-msg">{{ error() }}</p>
          }

          <button
            class="btn btn-primary full"
            type="submit"
            [disabled]="cargando() || !email || !password || (modo() === 'registro' && !nombre)"
          >
            {{ cargando() ? 'Procesando…' : modo() === 'login' ? 'Entrar' : 'Crear cuenta' }}
          </button>
        </form>
      </div>
    </div>
