    <div class="page-archivos">
      <div class="head">
        <div>
          <h1>Mis archivos</h1>
          <p class="muted">{{ total() }} archivo(s) en total</p>
        </div>
      </div>

      <!-- Toggle Personales / Compartido. El botón "Personales" es además zona de
           drop: arrastrando desde Compartido se sueltan ahí para copiar a personal
           ([data-drop-personal] lo detecta el explorador). -->
      <div class="ambito-toggle" [class.modo-compartido]="ambito() === 'compartido'">
        <button data-drop-personal [class.active]="ambito() === 'personal'" (click)="ambito.set('personal')">Personales</button>
        <button [class.active]="ambito() === 'compartido'" (click)="ambito.set('compartido')">Compartido</button>
      </div>

      @if (ambito() === 'personal') {
        <app-explorador [datos]="svc" [opciones]="opcionesPersonal" (totalCambio)="total.set($event)" />
      } @else {
        <app-compartido />
      }
    </div>
