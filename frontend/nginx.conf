server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Permite subir archivos hasta 50 MB (el backend tiene ese límite).
  client_max_body_size 50m;

  # Rutas de Angular (SPA): si el fichero no existe, servir index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Las peticiones /api/** se reenvían al contenedor del backend (misma red de
  # Docker). Así el navegador usa el mismo origen y no hay problemas de CORS.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # El chat (bucle de tool calling) y el OCR de facturas pueden tardar algo
    # más que el timeout por defecto de nginx (60s). 120s da margen sin
    # esconder durante demasiado tiempo un fallo real (modelo colgado, etc.).
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
