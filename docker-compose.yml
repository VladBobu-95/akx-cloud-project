services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clouddrive-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_HOST:-5433}:5432"
    volumes:
      - clouddrive_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: clouddrive-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "${MINIO_PORT_HOST:-9000}:9000"   # API S3
      - "${MINIO_CONSOLE_HOST:-9001}:9001" # Consola web
    volumes:
      - clouddrive_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: clouddrive-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db          # nombre del servicio dentro de la red de Docker
      DB_PORT: 5432        # puerto INTERNO, no el del host
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL:-deepseek-ocr}
      OLLAMA_CAPTION_MODEL: ${OLLAMA_CAPTION_MODEL:-granite3.2-vision}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT_HOST:-3000}:3000"

  # Frontend Angular servido por nginx. nginx sirve la SPA y hace de proxy de
  # /api hacia el contenedor api. Acceso: http://IP-del-servidor
  web:
    build: ./frontend
    container_name: clouddrive-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT_HOST:-80}:80"

volumes:
  clouddrive_db_data:
  clouddrive_minio_data:
